name: CI

on:
  push:
    branches:
      - main
      - master
  pull_request:

jobs:
  npm-lint:
    name: npm lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - name: Install npm dependencies
        run: npm ci
      - name: Run npm lint
        run: npm run lint

  npm-audit:
    name: npm audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - name: Install npm dependencies
        run: npm ci
      - name: Run npm audit
        run: npm audit --audit-level=moderate

  composer-audit:
    name: composer audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: 8.4
          extensions: mbstring, bcmath, zip, pdo_mysql, pcntl, redis
      - name: Cache composer/vendor
        uses: actions/cache@v4
        with:
          path: |
            ~/.composer/cache
            vendor
          key: ${{ runner.os }}-composer-${{ hashFiles('composer.lock') }}
          restore-keys: |
            ${{ runner.os }}-composer-
      - name: Install Composer dependencies
        run: composer install --prefer-dist --no-progress
      - name: Prepare Laravel
        run: |
          cp .env.example .env
          php artisan key:generate --ansi
      - name: Run composer audit
        run: composer audit --no-interaction

  larastan:
    name: Larastan (PHPStan)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: 8.4
          extensions: mbstring, bcmath, zip, pdo_mysql, pcntl, redis
      - name: Cache composer/vendor
        uses: actions/cache@v4
        with:
          path: |
            ~/.composer/cache
            vendor
          key: ${{ runner.os }}-composer-${{ hashFiles('composer.lock') }}
          restore-keys: |
            ${{ runner.os }}-composer-
      - name: Install Composer dependencies
        run: composer install --prefer-dist --no-progress
      - name: Prepare Laravel
        run: |
          cp .env.example .env
          php artisan key:generate --ansi
          php -r "file_exists('database/database.sqlite') || touch('database/database.sqlite');"
      - name: Run Larastan
        run: vendor/bin/phpstan analyse --memory-limit=512M --no-progress --debug

  pint:
    name: Laravel Pint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: 8.4
          extensions: mbstring, bcmath, zip, pdo_mysql, pcntl, redis
      - name: Cache composer/vendor
        uses: actions/cache@v4
        with:
          path: |
            ~/.composer/cache
            vendor
          key: ${{ runner.os }}-composer-${{ hashFiles('composer.lock') }}
          restore-keys: |
            ${{ runner.os }}-composer-
      - name: Install Composer dependencies
        run: composer install --prefer-dist --no-progress
      - name: Prepare Laravel
        run: |
          cp .env.example .env
          php artisan key:generate --ansi
      - name: Run Laravel Pint
        run: vendor/bin/pint -- --no-progress

  phpunit:
    name: PHPUnit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: 8.4
          extensions: mbstring, bcmath, zip, pdo_mysql, pcntl, redis
      - name: Cache composer/vendor
        uses: actions/cache@v4
        with:
          path: |
            ~/.composer/cache
            vendor
          key: ${{ runner.os }}-composer-${{ hashFiles('composer.lock') }}
          restore-keys: |
            ${{ runner.os }}-composer-
      - name: Install Composer dependencies
        run: composer install --prefer-dist --no-progress
      - name: Prepare Laravel
        run: |
          cp .env.example .env
          php artisan key:generate --ansi
          php -r "file_exists('database/database.sqlite') || touch('database/database.sqlite');"
      - name: Run PHPUnit
        run: vendor/bin/phpunit
